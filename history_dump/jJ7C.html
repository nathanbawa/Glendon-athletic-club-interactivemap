<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
    <title>360 Image Viewer</title>
    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            margin: 0;
            overflow: hidden;
            font-family: Arial, sans-serif;
            background: #000;
        }

        /* ── Navigation Arrows ── */
        .nav-button {
            position: fixed;
            top: 50%;
            transform: translateY(-50%);
            width: 60px;
            height: 60px;
            background: rgba(255,255,255,0.25);
            backdrop-filter: blur(6px);
            border: 1px solid rgba(255,255,255,0.4);
            color: white;
            font-size: 28px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 200;
            border-radius: 8px;
            touch-action: manipulation;
            transition: background 0.2s, transform 0.15s;
            -webkit-tap-highlight-color: transparent;
        }
        .nav-button:hover  { background: rgba(255,255,255,0.5); }
        .nav-button:active { background: rgba(255,255,255,0.7); transform: translateY(-50%) scale(0.93); }
        #leftBtn  { left: 16px; }
        #rightBtn { right: 16px; }

        /* ── Top-right button cluster ── */
        #btn-cluster {
            position: fixed;
            top: 14px;
            right: 14px;
            z-index: 200;
            display: flex;
            gap: 8px;
            flex-direction: column;
            align-items: flex-end;
        }

        .ui-btn {
            padding: 9px 14px;
            background: rgba(0,0,0,0.65);
            color: white;
            border: 1px solid rgba(255,255,255,0.3);
            border-radius: 6px;
            cursor: pointer;
            font-size: 12px;
            font-weight: bold;
            white-space: nowrap;
            transition: background 0.2s;
            -webkit-tap-highlight-color: transparent;
            touch-action: manipulation;
        }
        .ui-btn:hover { background: rgba(255,255,255,0.2); }

        /* ── iOS permission overlay ── */
        #permission-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.85);
            z-index: 999;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: white;
            text-align: center;
            padding: 30px;
            gap: 20px;
        }
        #permission-overlay h2 { font-size: 22px; }
        #permission-overlay p  { font-size: 14px; opacity: 0.8; max-width: 280px; line-height: 1.6; }
        #grant-btn {
            padding: 14px 32px;
            background: white;
            color: black;
            border: none;
            border-radius: 30px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            touch-action: manipulation;
        }

        /* ── Toast hint ── */
        #hint {
            position: fixed;
            bottom: 70px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.7);
            color: white;
            padding: 8px 18px;
            border-radius: 20px;
            font-size: 12px;
            z-index: 200;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.4s;
            white-space: nowrap;
        }
        #hint.show { opacity: 1; }

        /* ── Counter ── */
        #counter {
            position: fixed;
            bottom: 22px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.65);
            color: white;
            padding: 8px 20px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: bold;
            z-index: 200;
        }

        /* ── Mobile tweaks ── */
        @media (max-width: 480px) {
            .nav-button { width: 48px; height: 48px; font-size: 22px; }
            #leftBtn  { left: 8px; }
            #rightBtn { right: 8px; }
        }
    </style>
</head>
<body>

<!-- iOS gyroscope permission overlay -->
<div id="permission-overlay">
    <h2>🌐 Enable 360° View</h2>
    <p>Tap below to allow motion access so you can look around by tilting your phone.</p>
    <button id="grant-btn">Enable Motion & Rotation</button>
</div>

<!-- Button cluster (top-right) -->
<div id="btn-cluster">
    <!--
        Real VR button — calls A-Frame's enterVR() which activates
        WebXR stereoscopic (split-screen) rendering for headsets.
    -->
    <button class="ui-btn" id="vrBtn">🥽 Enter VR</button>

    <!--
        iOS motion permission button — only shown on iOS devices
        that haven't yet granted DeviceOrientationEvent permission.
    -->
    <button class="ui-btn" id="gyroBtn" style="display:none">📡 Enable Gyro</button>
</div>

<!-- Navigation arrows -->
<button id="leftBtn"  class="nav-button">❮</button>
<button id="rightBtn" class="nav-button">❯</button>

<!-- Counter -->
<div id="counter"><span id="imgNum">1</span> / 2</div>

<!-- Hint toast -->
<div id="hint"></div>

<!-- ─────────────────────────────────────────────
     A-Frame scene
     
     Key attributes explained:
     • vr-mode-ui="enabled: true"             – keeps A-Frame's native VR button
     • device-orientation-permission-ui        – A-Frame's own iOS prompt (backup)
     • renderer="antialias: true"              – smoother edges on mobile
     ───────────────────────────────────────── -->
<a-scene
    vr-mode-ui="enabled: true"
    device-orientation-permission-ui="enabled: true"
    renderer="antialias: true; colorManagement: true">

    <!--
        Camera entity — critical attributes for full 360° on mobile:
        • touchEnabled: true               → finger-drag rotates the scene
        • magicWindowTrackingEnabled: true → gyroscope moves the camera
                                             (the key missing piece for mobile 360°)
    -->
    <a-entity
        id="cameraEntity"
        camera
        look-controls="touchEnabled: true; magicWindowTrackingEnabled: true; reverseMouseDrag: false"
        wasd-controls="enabled: false">
    </a-entity>

    <a-sky id="skyImage" src="360photoconverter.jpg" rotation="0 -90 0"></a-sky>
</a-scene>

<script>
// ─── Image list ───────────────────────────────────────────────────────────────
const IMAGES = [
    '360photoconverter.jpg',
    'housev3converter.jpg'
];

let current = 0;
const sky      = document.getElementById('skyImage');
const imgNum   = document.getElementById('imgNum');
const scene    = document.querySelector('a-scene');
const vrBtn    = document.getElementById('vrBtn');
const gyroBtn  = document.getElementById('gyroBtn');
const hint     = document.getElementById('hint');
const overlay  = document.getElementById('permission-overlay');
const grantBtn = document.getElementById('grant-btn');

// ─── Image switching ──────────────────────────────────────────────────────────
function goTo(index) {
    current = (index + IMAGES.length) % IMAGES.length;
    sky.setAttribute('src', IMAGES[current]);
    imgNum.textContent = current + 1;
}

document.getElementById('leftBtn').addEventListener('click',  () => goTo(current - 1));
document.getElementById('rightBtn').addEventListener('click', () => goTo(current + 1));

document.addEventListener('keydown', e => {
    if (e.key === 'ArrowLeft')  goTo(current - 1);
    if (e.key === 'ArrowRight') goTo(current + 1);
});

// ─── Detect platform ─────────────────────────────────────────────────────────
const isIOS    = /iPad|iPhone|iPod/.test(navigator.userAgent) && !window.MSStream;
const isMobile = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);

// ─── Real VR mode (WebXR stereo split-screen) ─────────────────────────────────
//
//  scene.enterVR()  triggers A-Frame's WebXR renderer which renders
//  two side-by-side eye views for VR headsets (Meta Quest, Cardboard, etc.)
//  This is NOT the same as fullscreen — it's true stereoscopic VR.
//
vrBtn.addEventListener('click', () => {
    if (!scene.is('vr-mode')) {
        // A-Frame's built-in method — activates WebXR / stereoscopic mode
        scene.enterVR();
    } else {
        scene.exitVR();
    }
});

scene.addEventListener('enter-vr', () => { vrBtn.textContent = '✕ Exit VR'; });
scene.addEventListener('exit-vr',  () => { vrBtn.textContent = '🥽 Enter VR'; });

// ─── iOS gyroscope permission ─────────────────────────────────────────────────
//
//  iOS 13+ requires an explicit user gesture to call
//  DeviceOrientationEvent.requestPermission(). Without this the gyroscope
//  is silently blocked and mobile is limited to touch-drag only.
//
async function requestGyroPermission() {
    if (typeof DeviceOrientationEvent !== 'undefined' &&
        typeof DeviceOrientationEvent.requestPermission === 'function') {
        try {
            const response = await DeviceOrientationEvent.requestPermission();
            if (response === 'granted') {
                showHint('✅ Gyro enabled — tilt your phone to look around!');
                gyroBtn.style.display = 'none';
                overlay.style.display = 'none';
            } else {
                showHint('⚠️ Motion access denied. Use touch to look around.');
            }
        } catch (err) {
            console.warn('DeviceOrientation permission error:', err);
        }
    }
}

grantBtn.addEventListener('click', requestGyroPermission);
gyroBtn.addEventListener('click',  requestGyroPermission);

// On iOS, show the gyro button so users can grant permission at any time
if (isIOS) {
    gyroBtn.style.display = 'block';

    // On first mobile load, show the permission overlay automatically
    // so they can enable gyro before interacting with the scene
    scene.addEventListener('loaded', () => {
        // Small delay so the scene renders first
        setTimeout(() => {
            overlay.style.display = 'flex';
        }, 800);
    });
}

// ─── Hint toast helper ────────────────────────────────────────────────────────
function showHint(msg, duration = 3500) {
    hint.textContent = msg;
    hint.classList.add('show');
    setTimeout(() => hint.classList.remove('show'), duration);
}

// ─── First-visit mobile hint ──────────────────────────────────────────────────
if (isMobile && !isIOS) {
    // Android — gyro works without permission; just remind user how to navigate
    scene.addEventListener('loaded', () => {
        setTimeout(() => showHint('Drag or tilt phone to look around • Use arrows to switch images'), 1000);
    });
}
</script>
</body>
</html>
