<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Gym 3D Map</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

  <!-- model-viewer -->
  <script type="module"
    src="https://ajax.googleapis.com/ajax/libs/model-viewer/4.0.0/model-viewer.min.js">
  </script>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      background: linear-gradient(135deg, #1a2a3a 0%, #2a3f5f 100%);
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      overflow: hidden;
    }

    model-viewer {
      width: 100%;
      height: 100%;
      background: linear-gradient(135deg, #1a2a3a 0%, #2a3f5f 100%);
    }

    /* ===== HOTSPOTS ===== */
    .hotspot {
      position: absolute;
      width: 6px;
      height: 6px;
      background: transparent;
      border: none;
      border-radius: 0;
      cursor: pointer;
      padding: 0;
      transform: translate(-50%, -50%);
      touch-action: manipulation;
    }

    .hotspot-label {
      position: absolute;
      left: 0;
      top: 50%;
      transform: translateY(-50%);
      background: linear-gradient(135deg, rgba(255, 255, 255, 0.95), rgba(240, 245, 250, 0.95));
      color: #1a2a3a;
      padding: 10px 16px;
      border-radius: 8px;
      font-size: 18px;
      font-weight: 700;
      white-space: nowrap;
      box-shadow: 0 4px 16px rgba(0, 0, 0, 0.3);
      border-left: 4px solid #4da3ff;
      display: none;
      pointer-events: none;
      opacity: 1;
      transition: all 0.3s ease;
      z-index: 50;
    }

    .hotspot:hover .hotspot-label,
    .hotspot:focus .hotspot-label,
    .hotspot.active .hotspot-label {
      display: block;
      opacity: 1;
      box-shadow: 0 6px 20px rgba(0, 0, 0, 0.4);
    }

    .hotspot.overlapping .hotspot-label {
      opacity: 0.3;
    }

    .hotspot.overlapping:hover .hotspot-label,
    .hotspot.overlapping:focus .hotspot-label {
      opacity: 1;
    }

    /* ===== LEGEND ===== */
    .legend {
      position: fixed;
      bottom: 20px;
      left: 20px;
      background: rgba(255, 255, 255, 0.97);
      border-radius: 12px;
      padding: 16px 18px;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.3);
      font-size: 14px;
      max-height: 60vh;
      overflow-y: auto;
      z-index: 1000;
      min-width: 200px;
    }

    .legend-item {
      display: flex;
      align-items: center;
      margin-bottom: 10px;
      font-size: 13px;
      font-weight: 500;
      color: #333;
    }

    .legend-item:last-child {
      margin-bottom: 0;
    }

    .legend-item-color {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      margin-right: 10px;
      flex-shrink: 0;
    }

    .legend-item-icon {
      font-size: 16px;
      margin-right: 8px;
      flex-shrink: 0;
    }

    /* Scrollbar personnalisée */
    .legend::-webkit-scrollbar {
      width: 6px;
    }

    .legend::-webkit-scrollbar-track {
      background: rgba(0, 0, 0, 0.05);
      border-radius: 3px;
    }

    .legend::-webkit-scrollbar-thumb {
      background: rgba(0, 0, 0, 0.2);
      border-radius: 3px;
    }

    .legend::-webkit-scrollbar-thumb:hover {
      background: rgba(0, 0, 0, 0.3);
    }

    /* MOBILE RESPONSIVE */
    @media (max-width: 768px) {
      .hotspot-label {
        font-size: 16px;
        padding: 8px 14px;
      }

      .legend {
        bottom: 15px;
        left: 15px;
        padding: 14px 16px;
        font-size: 12px;
      }

      .legend-item {
        font-size: 12px;
        margin-bottom: 8px;
      }
    }

    @media (max-width: 480px) {
      .hotspot-label {
        font-size: 14px;
        padding: 8px 12px;
      }

      .legend {
        bottom: 10px;
        left: 10px;
        right: 10px;
        padding: 12px 14px;
        font-size: 11px;
      }

      .legend-item {
        font-size: 11px;
        margin-bottom: 7px;
      }

      .legend-item-icon {
        font-size: 14px;
      }
    }
  </style>
</head>

<body>
  <model-viewer
    id="modelViewer"
    src="MPTESTING.glb"
    camera-controls
    touch-action="pan-y"
    exposure="1.2"
    shadow-intensity="1.5"
    field-of-view="60deg"
    camera-orbit="45deg 85deg 80m"
    min-camera-orbit="auto auto 5m"
    max-camera-orbit="auto auto 200m"
  ></model-viewer>

  <!-- LEGEND -->
  <div class="legend" id="legend"></div>

  <script type="module">
    // Configuration des salles
    const ROOMS = [
      {
        id: 'lobby',
        name: 'Lobby',
        position: '-0.465m -1.556m 16.845m',
        icon: '🏢',
        color: '#f5c16c'
      },
      {
        id: 'women-locker',
        name: 'Women Locker Room',
        position: '-5.224m -1.028m -0.964m',
        icon: '🚪',
        color: '#8faadc'
      },
      {
        id: 'men-locker',
        name: 'Men Locker Room',
        position: '-6.623m -1.022m -12.298m',
        icon: '🚪',
        color: '#8faadc'
      },
      {
        id: 'pool',
        name: 'Swimming Pool',
        position: '-23.436m -1.043m -5.563m',
        icon: '🏊',
        color: '#4da3ff'
      },
      {
        id: 'golf',
        name: 'Golf Court',
        position: '8.065m -1.033m 15.761m',
        icon: '⛳',
        color: '#7cc576'
      },
      {
        id: 'boxing',
        name: 'Boxing Room',
        position: '14.131m -1.058m 15.917m',
        icon: '🥊',
        color: '#e57373'
      },
      {
        id: 'stretching',
        name: 'Stretching Room',
        position: '20.581m -1.039m 16.087m',
        icon: '🧘',
        color: '#ba68c8'
      },
      {
        id: 'weight',
        name: 'Weight Room',
        position: '16.158m -1.057m -3.158m',
        icon: '🏋️',
        color: '#7cc576'
      }
    ];

    // Initialisation
    class GymViewer {
      constructor() {
        this.modelViewer = document.getElementById('modelViewer');
        this.legend = document.getElementById('legend');
        this.hotspots = [];
        this.init();
      }

      init() {
        this.createLegend();
        this.createHotspots();
        this.setupEventListeners();
      }

      createLegend() {
        const uniqueRooms = {};
        ROOMS.forEach(room => {
          if (!uniqueRooms[room.id]) {
            uniqueRooms[room.id] = room;
          }
        });

        Object.values(uniqueRooms).forEach(room => {
          const item = document.createElement('div');
          item.className = 'legend-item';
          item.innerHTML = `
            <div class="legend-item-color" style="background-color: ${room.color}"></div>
            <span class="legend-item-icon">${room.icon}</span>
            <span>${room.name}</span>
          `;
          this.legend.appendChild(item);
        });
      }

      createHotspots() {
        ROOMS.forEach((room, index) => {
          const hotspot = document.createElement('button');
          hotspot.className = 'hotspot';
          hotspot.id = `hotspot-${room.id}`;
          hotspot.slot = `hotspot-${index + 1}`;
          hotspot.setAttribute('data-position', room.position);
          hotspot.setAttribute('data-room-id', room.id);
          hotspot.setAttribute('aria-label', room.name);

          const label = document.createElement('div');
          label.className = 'hotspot-label';
          label.textContent = room.name;

          hotspot.appendChild(label);
          this.modelViewer.appendChild(hotspot);

          this.hotspots.push({
            element: hotspot,
            label: label,
            roomId: room.id
          });
        });
      }

      setupEventListeners() {
        // Détection de chevauchement
        this.modelViewer.addEventListener('camera-change', () => {
          this.detectOverlaps();
        });

        window.addEventListener('resize', () => {
          this.detectOverlaps();
        });

        // Détection périodique
        setInterval(() => this.detectOverlaps(), 500);

        // Événements des hotspots
        this.hotspots.forEach(hotspot => {
          hotspot.element.addEventListener('mouseenter', () => {
            hotspot.element.classList.add('active');
          });

          hotspot.element.addEventListener('mouseleave', () => {
            hotspot.element.classList.remove('active');
          });

          hotspot.element.addEventListener('click', () => {
            this.handleHotspotClick(hotspot.roomId);
          });
        });
      }

      detectOverlaps() {
        const visibleLabels = [];

        this.hotspots.forEach(hotspot => {
          const label = hotspot.label;
          if (label.style.display !== 'none' && label.offsetParent !== null) {
            const rect = label.getBoundingClientRect();
            visibleLabels.push({
              hotspot,
              rect: {
                left: rect.left,
                top: rect.top,
                right: rect.right,
                bottom: rect.bottom,
                width: rect.width,
                height: rect.height
              }
            });
          }
        });

        // Réinitialiser
        this.hotspots.forEach(h => h.element.classList.remove('overlapping'));

        // Détecter les chevauchements
        for (let i = 0; i < visibleLabels.length; i++) {
          for (let j = i + 1; j < visibleLabels.length; j++) {
            if (this.rectsOverlap(visibleLabels[i].rect, visibleLabels[j].rect)) {
              visibleLabels[i].hotspot.element.classList.add('overlapping');
              visibleLabels[j].hotspot.element.classList.add('overlapping');
            }
          }
        }
      }

      rectsOverlap(rect1, rect2) {
        return !(rect1.right < rect2.left ||
                 rect1.left > rect2.right ||
                 rect1.bottom < rect2.top ||
                 rect1.top > rect2.bottom);
      }

      handleHotspotClick(roomId) {
        console.log(`Clicked on: ${roomId}`);
        // Ajouter ici les actions au clic (par exemple, naviguer vers une page de détails)
      }
    }

    // Initialiser au chargement
    document.addEventListener('DOMContentLoaded', () => {
      new GymViewer();
    });

    // Fallback si déjà chargé
    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', () => {
        new GymViewer();
      });
    } else {
      setTimeout(() => new GymViewer(), 100);
    }
  </script>
</body>
</html>
