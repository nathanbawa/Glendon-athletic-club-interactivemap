<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
    <title>360 Image Viewer</title>
    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { overflow: hidden; background: #000; font-family: Arial, sans-serif; }

        .nav-btn {
            position: fixed;
            top: 50%;
            transform: translateY(-50%);
            width: 56px; height: 56px;
            background: rgba(255,255,255,0.2);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255,255,255,0.35);
            border-radius: 8px;
            color: #fff;
            font-size: 26px;
            cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            z-index: 300;
            touch-action: manipulation;
            -webkit-tap-highlight-color: transparent;
            transition: background 0.2s, transform 0.15s;
            user-select: none;
        }
        .nav-btn:active { background: rgba(255,255,255,0.55); transform: translateY(-50%) scale(0.92); }
        #leftBtn  { left: 14px; }
        #rightBtn { right: 14px; }

        #vrBtn {
            position: fixed;
            bottom: 24px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 300;
            padding: 12px 28px;
            background: rgba(0,0,0,0.75);
            color: #fff;
            border: 1px solid rgba(255,255,255,0.35);
            border-radius: 30px;
            font-size: 15px;
            font-weight: bold;
            cursor: pointer;
            touch-action: manipulation;
            -webkit-tap-highlight-color: transparent;
            transition: background 0.2s;
            letter-spacing: 0.5px;
        }
        #vrBtn:hover  { background: rgba(255,255,255,0.18); }
        #vrBtn:active { background: rgba(255,255,255,0.35); }

        /* Gyro toggle button */
        #gyroBtn {
            position: fixed;
            top: 16px;
            right: 16px;
            z-index: 300;
            padding: 8px 12px;
            background: rgba(0,0,0,0.7);
            color: #fff;
            border: 1px solid rgba(255,255,255,0.35);
            border-radius: 6px;
            font-size: 13px;
            font-weight: bold;
            cursor: pointer;
            touch-action: manipulation;
            -webkit-tap-highlight-color: transparent;
            transition: all 0.2s;
        }
        #gyroBtn:hover { background: rgba(255,255,255,0.18); }
        #gyroBtn:active { background: rgba(255,255,255,0.35); }
        #gyroBtn.active { background: rgba(76, 175, 80, 0.7); border-color: rgba(76, 175, 80, 1); }

        /* Bottom image selector */
        #imageSelector {
            position: fixed;
            bottom: 24px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 12px;
            z-index: 300;
            justify-content: center;
            flex-wrap: wrap;
            max-width: 90vw;
        }

        .image-box {
            width: 70px;
            height: 70px;
            background: rgba(0,0,0,0.6);
            border: 2px solid rgba(255,255,255,0.3);
            border-radius: 8px;
            cursor: pointer;
            display: flex;
            align-items: flex-end;
            justify-content: center;
            flex-direction: column;
            font-size: 11px;
            color: #fff;
            text-align: center;
            transition: all 0.2s;
            touch-action: manipulation;
            -webkit-tap-highlight-color: transparent;
            padding: 4px;
            background-size: cover;
            background-position: center;
            position: relative;
            overflow: hidden;
        }

        .image-box::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(to bottom, transparent 50%, rgba(0,0,0,0.8) 100%);
            pointer-events: none;
        }

        .image-box-label {
            position: relative;
            z-index: 10;
            background: rgba(0,0,0,0.5);
            padding: 3px 6px;
            border-radius: 4px;
            white-space: nowrap;
            font-size: 10px;
        }

        .image-box:hover { background: rgba(255,255,255,0.15); border-color: rgba(255,255,255,0.5); }
        .image-box.active { border-color: #4CAF50; background: rgba(76, 175, 80, 0.3); }
        .image-box:active { transform: scale(0.95); }

        #counter {
            position: fixed;
            top: 16px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.6);
            color: #fff;
            padding: 6px 18px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: bold;
            z-index: 300;
            pointer-events: none;
        }

        #toast {
            position: fixed;
            bottom: 80px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.78);
            color: #fff;
            padding: 9px 20px;
            border-radius: 20px;
            font-size: 12px;
            z-index: 300;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.4s;
            white-space: nowrap;
            max-width: 90vw;
            text-align: center;
        }
        #toast.show { opacity: 1; }

        @media (max-width: 480px) {
            .nav-btn { width: 46px; height: 46px; font-size: 20px; }
            #leftBtn  { left: 8px; }
            #rightBtn { right: 8px; }
        }
    </style>
</head>
<body>

<div id="counter"><span id="imgNum">1</span> / 2</div>

<button id="gyroBtn" title="Toggle gyroscope (mobile)">📍 Gyro: OFF</button>

<button id="leftBtn"  class="nav-btn">❮</button>
<button id="rightBtn" class="nav-btn">❯</button>

<div id="imageSelector">
    <div class="image-box" data-index="1" style="background-image: url('housev3converter.jpg');" title="Living room">
        <div class="image-box-label">Living room</div>
    </div>
    <div class="image-box" data-index="0" style="background-image: url('360photoconverter.jpg');" title="Swimming pool">
        <div class="image-box-label">Swimming pool</div>
    </div>
</div>

<div id="toast"></div>

<!--
    look-controls explanation:
      touchEnabled: true                → finger drag rotates the camera ✅
      magicWindowTrackingEnabled: false → gyro/tilt completely OFF ✅
      pointerLockEnabled: false         → no pointer lock on desktop

    VR works like YouTube:
      scene.enterVR() triggers A-Frame's WebXR renderer →
      two barrel-distorted eye views for any Cardboard-style headset.
      REQUIRES the page to be served over HTTPS or localhost.
-->
<a-scene
    id="scene"
    vr-mode-ui="enabled: true"
    device-orientation-permission-ui="enabled: false"
    renderer="antialias: true; colorManagement: true">

    <a-entity
        id="cam"
        camera
        look-controls="touchEnabled: true; magicWindowTrackingEnabled: false; pointerLockEnabled: false"
        wasd-controls="enabled: false"
        position="0 1.6 0">
    </a-entity>

    <a-sky id="sky" src="360photoconverter.jpg" rotation="0 -90 0"></a-sky>

</a-scene>

<script>
// ── Image list — add more filenames here if needed ─────────────────────────
const IMAGES = [
    '360photoconverter.jpg',
    'housev3converter.jpg'
];
let current = 0;

const sky    = document.getElementById('sky');
const imgNum = document.getElementById('imgNum');

function goTo(i) {
    current = (i + IMAGES.length) % IMAGES.length;
    sky.setAttribute('src', IMAGES[current]);
    imgNum.textContent = current + 1;
}

document.getElementById('leftBtn') .addEventListener('click', () => goTo(current - 1));
document.getElementById('rightBtn').addEventListener('click', () => goTo(current + 1));
document.addEventListener('keydown', e => {
    if (e.key === 'ArrowLeft')  goTo(current - 1);
    if (e.key === 'ArrowRight') goTo(current + 1);
});

// ── VR button → calls A-Frame's enterVR() for real stereo split-screen ─────
//   This is the same mechanism YouTube VR uses.
//   Works on: Meta Quest browser, Chrome on Android + Cardboard,
//             any WebXR-compatible browser served over HTTPS.
const scene = document.getElementById('scene');
const cam = document.getElementById('cam');
const gyroBtn = document.getElementById('gyroBtn');

let gyroEnabled = false;
const isMobile = /Android|webOS|iPhone|iPad|iPod/i.test(navigator.userAgent);

// ── Gyro toggle button ─────────────────────────────────────────────────────
gyroBtn.addEventListener('click', () => {
    gyroEnabled = !gyroEnabled;
    cam.setAttribute('look-controls', `touchEnabled: true; magicWindowTrackingEnabled: ${gyroEnabled}; pointerLockEnabled: false`);
    
    if (gyroEnabled) {
        gyroBtn.classList.add('active');
        gyroBtn.textContent = '📍 Gyro: ON';
        showToast('Gyroscope enabled - tilt your device to look around');
    } else {
        gyroBtn.classList.remove('active');
        gyroBtn.textContent = '📍 Gyro: OFF';
        showToast('Gyroscope disabled');
    }
});

// Hide gyro button on desktop
if (!isMobile) {
    gyroBtn.style.display = 'none';
}

// ── Image selector boxes ───────────────────────────────────────────────────
const imageBoxes = document.querySelectorAll('.image-box');
imageBoxes.forEach(box => {
    box.addEventListener('click', () => {
        const index = parseInt(box.getAttribute('data-index'));
        goTo(index);
        
        // Update active state
        imageBoxes.forEach(b => b.classList.remove('active'));
        document.querySelector(`.image-box[data-index="${index}"]`).classList.add('active');
    });
});

// Set initial active state
document.querySelector(`.image-box[data-index="0"]`).classList.add('active');

// ── Show 360 AR prompt on launch ────────────────────────────────────────────
const toast = document.getElementById('toast');

function showToast(msg, ms = 4500) {
    toast.textContent = msg;
    toast.classList.add('show');
    setTimeout(() => toast.classList.remove('show'), ms);
}

// ── Show 360 AR prompt on launch ────────────────────────────────────────────
if (isMobile) {
    scene.addEventListener('loaded', () => {
        setTimeout(() => showToast('📸 360° AR mode ready - Drag to look around • Tap arrows to switch images'), 1200);
    });
} else {
    scene.addEventListener('loaded', () => {
        setTimeout(() => showToast('🖱️ Use mouse to look around • Arrow keys or buttons to switch images'), 1200);
    });
}
</script>
</body>
</html>
