<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Gym 3D Map</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

  <!-- CSS externe -->
  <link rel="stylesheet" href="styles.css">

  <!-- model-viewer -->
  <script type="module"
    src="https://ajax.googleapis.com/ajax/libs/model-viewer/4.0.0/model-viewer.min.js">
  </script>
</head>

<body>
  <!-- Model Viewer -->
  <model-viewer
    id="modelViewer"
    src="MPTESTING.glb"
    camera-controls
    touch-action="pan-y"
    exposure="1.2"
    shadow-intensity="1.5"
    field-of-view="60deg"
    camera-orbit="45deg 85deg 80m"
    min-camera-orbit="auto auto 5m"
    max-camera-orbit="auto auto 200m"
  >
    <!-- HOTSPOTS -->
    <button class="hotspot" slot="hotspot-1" data-position="-0.465m -1.556m 16.845m" data-room-id="lobby">
      <div class="hotspot-label">Lobby</div>
    </button>

    <button class="hotspot" slot="hotspot-2" data-position="-5.224m -1.028m -0.964m" data-room-id="women-locker">
      <div class="hotspot-label">Women Locker Room</div>
    </button>

    <button class="hotspot" slot="hotspot-3" data-position="-6.623m -1.022m -12.298m" data-room-id="men-locker">
      <div class="hotspot-label">Men Locker Room</div>
    </button>

    <button class="hotspot" slot="hotspot-4" data-position="-23.436m -1.043m -5.563m" data-room-id="pool">
      <div class="hotspot-label">Swimming Pool</div>
    </button>

    <button class="hotspot" slot="hotspot-5" data-position="8.065m -1.033m 15.761m" data-room-id="golf">
      <div class="hotspot-label">Golf Court</div>
    </button>

    <button class="hotspot" slot="hotspot-6" data-position="14.131m -1.058m 15.917m" data-room-id="boxing">
      <div class="hotspot-label">Boxing Room</div>
    </button>

    <button class="hotspot" slot="hotspot-7" data-position="20.581m -1.039m 16.087m" data-room-id="stretching">
      <div class="hotspot-label">Stretching Room</div>
    </button>

    <button class="hotspot" slot="hotspot-8" data-position="16.158m -1.057m -3.158m" data-room-id="weight">
      <div class="hotspot-label">Weight Room</div>
    </button>
  </model-viewer>

  <!-- Legend Container -->
  <div class="legend" id="legend"></div>

  <!-- Script principal -->
  <script src="script.js"></script>
</body>
</html>
