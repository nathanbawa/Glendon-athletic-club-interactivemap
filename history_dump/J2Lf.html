<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Gym 3D Map</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

  <!-- CSS -->
  <link rel="stylesheet" href="styles.css">

  <!-- model-viewer -->
  <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/4.0.0/model-viewer.min.js"></script>
</head>

<body>

  <!-- 3D Model -->
  <model-viewer
    id="modelViewer"
    src="MPTESTING.glb"
    ar
    ar-modes="webxr scene-viewer quick-look"
    camera-controls
    tone-mapping="neutral"
    shadow-intensity="1.41"
    exposure="0.71"
    camera-orbit="759.7deg 29.22deg 148.4m"
    field-of-view="25.11deg">

    <!-- HOTSPOTS -->
    <button class="Hotspot" slot="hotspot-1"
      data-room-id="lobby"
      data-position="-0.4653269893870444m -1.5559638886193172m 16.84453083543924m">
      <div class="HotspotAnnotation"><span class="hotspot-icon">🏢</span>Lobby</div>
    </button>

    <button class="Hotspot" slot="hotspot-2"
      data-room-id="women-locker"
      data-position="-5.223952330043673m -1.0280713024670123m -0.9642809204154494m">
      <div class="HotspotAnnotation"><span class="hotspot-icon">🚪</span>Women Locker</div>
    </button>

    <button class="Hotspot" slot="hotspot-3"
      data-room-id="men-locker"
      data-position="-6.623271348580199m -1.021624184136158m -12.298263665080864m">
      <div class="HotspotAnnotation"><span class="hotspot-icon">🚪</span>Men Locker</div>
    </button>

    <button class="Hotspot" slot="hotspot-4"
      data-room-id="pool"
      data-position="-23.436438108007223m -1.0432716632050614m -5.562906483661369m">
      <div class="HotspotAnnotation"><span class="hotspot-icon">🏊</span>Swimming Pool</div>
    </button>

    <button class="Hotspot" slot="hotspot-5"
      data-room-id="golf"
      data-position="8.064971976974025m -1.0327714658726705m 15.761076455541659m">
      <div class="HotspotAnnotation"><span class="hotspot-icon">⛳</span>Golf Court</div>
    </button>

    <button class="Hotspot" slot="hotspot-6"
      data-room-id="boxing"
      data-position="14.13131806409823m -1.0579870760338108m 15.916635318479553m">
      <div class="HotspotAnnotation"><span class="hotspot-icon">🥊</span>Boxing Room</div>
    </button>

    <button class="Hotspot" slot="hotspot-7"
      data-room-id="stretching"
      data-position="20.581467913650524m -1.039285045851912m 16.087181238125005m">
      <div class="HotspotAnnotation"><span class="hotspot-icon">🧘</span>Stretching</div>
    </button>

    <button class="Hotspot" slot="hotspot-8"
      data-room-id="weight"
      data-position="16.158126817246306m -1.0568046291235618m -3.1582800654223995m">
      <div class="HotspotAnnotation"><span class="hotspot-icon">🏋️</span>Weight Room</div>
    </button>
  </model-viewer>

  <!-- Overlay -->
  <div class="scene-overlay" id="sceneOverlay"></div>

  <!-- Legend -->
  <div class="legend" id="legend">
    <button class="legend-toggle" id="legendToggle">▼</button>
    <h2 class="legend-title">First Floor Map<br>Glendon Athletic Club</h2>
  </div>

  <!-- Logo -->
  <div class="logo-container">
    <img src="GLENDON_Logo_Glendon_PRIMARY.png" class="york-logo" alt="Glendon Logo">
  </div>

  <!-- JS -->
  <script src="script.js"></script>
</body>
</html>
