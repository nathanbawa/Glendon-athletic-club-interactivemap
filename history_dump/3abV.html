<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>3D Gym Viewer</title>

  <!-- Styles -->
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="styles.css">

  <!-- GSAP -->
  <script src="https://unpkg.com/gsap@3/dist/gsap.min.js" defer></script>

  <!-- model-viewer -->
  <script type="module"
    src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js">
  </script>
</head>

<body>

  <!-- Three.js background -->
  <div id="scene"></div>

  <!-- 3D MODEL -->
  <model-viewer
    id="modelViewer"
    src="testmapdudu-compressed.glb"
    camera-controls
    exposure="1"
    shadow-intensity="1"
    style="width:100%; height:100%; position:absolute; inset:0;">
    
    <!-- 🔴 Your hotspots stay EXACTLY as you have them -->
    <!-- Example structure (replace with your real ones if already present) -->
    <!--
    <button class="Hotspot" slot="hotspot-1"
      data-room-id="lobby"
      data-position="0m 1m 0m">
      <div class="HotspotAnnotation">Lobby</div>
    </button>
    -->

  </model-viewer>

  <!-- Legend -->
  <div id="legend"></div>

  <!-- Scripts -->
  <script type="module" src="main.js"></script>
  <script src="script.js"></script>

</body>
</html>
