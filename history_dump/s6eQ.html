<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>360 Image Viewer</title>
    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            margin: 0;
            overflow: hidden;
            font-family: Arial, sans-serif;
            background: #000;
        }

        /* Navigation Arrows */
        .nav-button {
            position: fixed;
            top: 50%;
            transform: translateY(-50%);
            width: 60px;
            height: 60px;
            background: rgba(255, 255, 255, 0.3);
            border: none;
            color: white;
            font-size: 32px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 100;
            transition: all 0.3s ease;
            border-radius: 5px;
            touch-action: manipulation;
        }

        .nav-button:hover {
            background: rgba(255, 255, 255, 0.6);
            transform: translateY(-50%) scale(1.1);
        }

        .nav-button:active {
            background: rgba(255, 255, 255, 0.8);
            transform: translateY(-50%) scale(0.95);
        }

        #leftBtn {
            left: 20px;
        }

        #rightBtn {
            right: 20px;
        }

        /* Mobile optimizations */
        @media (max-width: 768px) {
            .nav-button {
                width: 50px;
                height: 50px;
                font-size: 28px;
            }

            #leftBtn {
                left: 10px;
            }

            #rightBtn {
                right: 10px;
            }
        }

        @media (max-width: 480px) {
            .nav-button {
                width: 45px;
                height: 45px;
                font-size: 24px;
            }

            #leftBtn {
                left: 8px;
            }

            #rightBtn {
                right: 8px;
            }
        }

        /* VR Mode Hint */
        .vr-hint {
            position: fixed;
            top: 10px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.6);
            color: white;
            padding: 8px 16px;
            border-radius: 15px;
            font-size: 12px;
            z-index: 100;
            opacity: 0;
            transition: opacity 0.3s ease;
            pointer-events: none;
        }

        .vr-hint.show {
            opacity: 1;
        }

        /* Image Counter */
        .counter {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.7);
            color: white;
            padding: 10px 20px;
            border-radius: 20px;
            font-size: 14px;
            z-index: 100;
            font-weight: bold;
        }

        @media (max-width: 480px) {
            .counter {
                bottom: 15px;
                padding: 8px 16px;
                font-size: 12px;
            }
        }
    </style>
</head>

<body>
    <!-- VR Mode Hint -->
    <div class="vr-hint" id="vrHint">Pan to rotate • Use arrows to change images • Click VR icon for immersive mode</div>

    <!-- VR Button (Manual VR/Fullscreen) -->
    <button id="vrBtn" style="position: fixed; top: 10px; right: 10px; z-index: 100; padding: 10px 15px; background: rgba(0,0,0,0.7); color: white; border: 1px solid rgba(255,255,255,0.3); border-radius: 5px; cursor: pointer; font-size: 12px; font-weight: bold; transition: all 0.3s ease;" title="Enter VR/Fullscreen mode">📱 VR</button>

    <!-- Navigation Buttons -->
    <button id="leftBtn" class="nav-button" title="Previous image">❮</button>
    <button id="rightBtn" class="nav-button" title="Next image">❯</button>

    <!-- Counter Display -->
    <div class="counter">
        <span id="imageIndex">1</span> / 2
    </div>

    <!-- A-Frame Scene -->
    <a-scene 
        vr-mode-ui="enabled: true"
        device-orientation-permission-ui="enabled: true"
        renderer="antialias: true">
        
        <!-- Camera with look controls (touch + gyro enabled) -->
        <a-entity 
            id="cameraEntity" 
            camera 
            look-controls="touchEnabled: true; magicWindowTrackingEnabled: true" 
            wasd-controls="enabled: false">
        </a-entity>

        <!-- 360 Image (will be swapped dynamically) -->
        <a-sky id="skyImage" src="360photoconverter.jpg" rotation="0 -90 0"></a-sky>
    </a-scene>

    <script>
        const images = [
            '360photoconverter.jpg',
            'housev3converter.jpg'
        ];

        let currentImageIndex = 0;
        const skyImage = document.getElementById('skyImage');
        const imageIndexDisplay = document.getElementById('imageIndex');
        const leftBtn = document.getElementById('leftBtn');
        const rightBtn = document.getElementById('rightBtn');
        const vrHint = document.getElementById('vrHint');
        const cameraEntity = document.getElementById('cameraEntity');
        const scene = document.querySelector('a-scene');

        const isMobile = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);
        let isInVRMode = false;

        // Function to change image
        function changeImage(index) {
            currentImageIndex = index;
            skyImage.setAttribute('src', images[currentImageIndex]);
            imageIndexDisplay.textContent = currentImageIndex + 1;
        }

        // Navigate to previous image
        function previousImage() {
            const newIndex = currentImageIndex === 0 ? images.length - 1 : currentImageIndex - 1;
            changeImage(newIndex);
        }

        // Navigate to next image
        function nextImage() {
            const newIndex = currentImageIndex === images.length - 1 ? 0 : currentImageIndex + 1;
            changeImage(newIndex);
        }

        // Event listeners for buttons
        leftBtn.addEventListener('click', previousImage);
        rightBtn.addEventListener('click', nextImage);

        // Keyboard navigation (desktop only)
        document.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowLeft') previousImage();
            if (e.key === 'ArrowRight') nextImage();
        });

        // Handle VR mode entry/exit
        scene.addEventListener('enter-vr', () => {
            isInVRMode = true;
        });

        scene.addEventListener('exit-vr', () => {
            isInVRMode = false;
        });

        // Disable look-controls on mobile by default (only for non-VR mode)
        if (isMobile) {
            setTimeout(() => {
                cameraEntity.setAttribute('look-controls', 'enabled: true');
                vrHint.classList.add('show');
                setTimeout(() => {
                    vrHint.classList.remove('show');
                }, 4000);
            }, 500);
        }

        // Initialize display
        imageIndexDisplay.textContent = currentImageIndex + 1;
    </script>
</body>
</html>
