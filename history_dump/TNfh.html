<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>3D Map Viewer</title>

  <!-- Model Viewer -->
  <script type="module"
    src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js">
  </script>

  <style>
    body {
      margin: 0;
      background: #ECE8E6;
    }

    model-viewer {
      width: 100vw;
      height: 100vh;
    }

    .Hotspot {
      background: none;
      border: none;
      cursor: pointer;
      transform: translate(-50%, -50%);
    }

    .HotspotAnnotation {
      background: rgba(0, 0, 0, 0.7);
      color: white;
      padding: 6px 10px;
      border-radius: 6px;
      font-size: 12px;
      white-space: nowrap;
      pointer-events: none;
    }

    .Hotspot:hover .HotspotAnnotation {
      background: white;
      color: black;
    }
  </style>
</head>

<body>

<model-viewer
  id="viewer"
  src="carteintergl1.compressed.glb"
  camera-controls
  touch-action="none"

  field-of-view="45deg"
  min-field-of-view="25deg"
  max-field-of-view="60deg"

  interpolation-decay="200"

  min-camera-orbit="auto 30deg 5m"
  max-camera-orbit="auto 85deg 40m"

  tone-mapping="neutral"
  shadow-intensity="1"
  ar
>

  <!-- LOBBY HOTSPOT -->
  <button
    class="Hotspot"
    slot="hotspot-lobby"
    data-position="-0.7575m -1.556m 16.83m"
    data-normal="0m 1m 0m"
    data-orbit="0deg 75deg 18m"
    data-target="-0.7575m -1.556m 16.83m">

    <div class="HotspotAnnotation">LOBBY</div>
  </button>

  <!-- GYM HOTSPOT -->
  <button
    class="Hotspot"
    slot="hotspot-gym"
    data-position="5m -1.2m 10m"
    data-normal="0m 1m 0m"
    data-orbit="45deg 70deg 20m"
    data-target="5m -1.2m 10m">

    <div class="HotspotAnnotation">GYM</div>
  </button>

</model-viewer>

<script>
  const viewer = document.querySelector('#viewer');

  viewer.addEventListener('click', (event) => {
    const hotspot = event.target.closest('.Hotspot');
    if (!hotspot) return;

    const orbit = hotspot.dataset.orbit;
    const target = hotspot.dataset.target;

    if (orbit && target) {
      viewer.cameraOrbit = orbit;
      viewer.cameraTarget = target;
    }
  });
</script>

</body>
</html>
