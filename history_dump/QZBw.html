<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>3D Campus Viewer</title>

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

  <!-- Styles -->
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="styles.css">

  <!-- GSAP -->
  <script src="https://unpkg.com/gsap@3/dist/gsap.min.js"></script>

  <!-- model-viewer -->
  <script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>
</head>

<body>

  <!-- Topbar -->
  <header class="topbar">
    <div class="brand">
      <div class="brand-mark"></div>
      <div class="brand-text">Campus Viewer</div>
    </div>

    <div class="nav-actions">
      <button class="nav-button" data-action="zoom-in">Zoom +</button>
      <button class="nav-button" data-action="zoom-out">Zoom −</button>
      <button class="nav-button" data-action="reset">Reset</button>
    </div>
  </header>

  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="panel-header">
      <div class="panel-title">Locations</div>
      <button class="panel-toggle" aria-expanded="true">Toggle</button>
    </div>
    <div id="locationList" class="panel-list"></div>
  </aside>

  <!-- Three.js Scene -->
  <div class="map-area">
    <div id="scene" class="scene"></div>
  </div>

  <!-- Model Viewer -->
  <model-viewer
    id="modelViewer"
    src="model.glb"
    camera-controls
    auto-rotate
    style="display:none">
    
    <!-- Example hotspot -->
    <!--
    <button class="Hotspot"
      slot="hotspot-1"
      data-room-id="lobby"
      data-position="0m 1m 0m">
      <div class="HotspotAnnotation">Lobby</div>
    </button>
    -->
  </model-viewer>

  <!-- Legend -->
  <div id="legend" class="legend">
    <div class="legend-title">Map Legend</div>
  </div>

  <!-- Scripts -->
  <script type="module" src="main.js"></script>
  <script src="script.js"></script>

</body>
</html>
